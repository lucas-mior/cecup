# cecup rsync exclusion patterns
# ------------------------------
# Pattern rules:
#  'filename'      excludes any file/dir named filename
#  '*.ext'         excludes all files with .ext extension
#  '/dir/'         excludes a specific directory at the root
#  'path/to/file'  excludes specific relative path
#  '# comment'     lines starting with # are ignored

